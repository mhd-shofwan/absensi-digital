<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Absensi Kajian
    </title>
    
    <link href="assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .bg-white.shadow-sm,
        .bg-white.shadow,
        .bg-white.shadow-md,
        .bg-white.shadow-soft {
            border: 1px solid rgba(226, 232, 240, 0.8) !important;
        }
    </style>

</head>

<body class="bg-blue-200">

    <!-- APP -->

    <div
        id="app"
        class="
            min-h-screen
            flex
            flex-col
        "
    >

        <!-- HEADER -->

        <header
            class="
                sticky
                top-0
                z-50

                bg-white/95
                backdrop-blur

                border-b
                border-slate-200
            "
        >

            <div
                class="
                    max-w-7xl
                    mx-auto

                    h-16

                    px-4

                    flex
                    items-center
                    justify-between
                "
            >

                <div
                    class="
                        flex
                        items-center
                        gap-3
                    "
                >

                    <img
                        id="appLogo"
                        src="logo.png"
                        alt="Logo"
                        class="
                            w-10
                            h-10
                            rounded-xl
                            cursor-pointer
                            border
                        "
                    >

                    <div>

                        <div
                            class="
                                font-bold
                                text-slate-800
                                text-xl
                            "
                        >
                            Absensi Kajian
                        </div>

                    </div>

                </div>

                <div
                    class="
                        text-xs
                        text-slate-400
                    "
                >
                    Sistem Absensi Digital
                </div>

            </div>

        </header>

        <!-- CONTENT -->

        <main
            id="content"
            class="
                flex-1

                w-full

                max-w-7xl
                mx-auto

                p-4
                md:p-6
            "
        >

            <div
                class="
                    bg-white
                    rounded-3xl
                    p-8
                    shadow-soft
                "
            >
                Loading...
            </div>

        </main>

        <!-- FOOTER -->
        <footer class="mt-auto py-4 text-center text-sm text-slate-500 border-t border-slate-200 bg-white">
            <span id="appVersionText">v1.0.0</span> Dev by <a href="https://github.com/mhd-shofwan" target="_blank" class="text-blue-600 hover:underline font-medium">Mhd Shofwan</a>
        </footer>

    </div>

    <!-- LOGIN MODAL -->

    <div
        id="loginModal"
        class="
            fixed
            inset-0

            hidden

            items-center
            justify-center

            bg-black/50

            p-4

            z-[999]
        "
    >

        <div
            class="
                w-full
                max-w-md

                bg-white

                rounded-4xl

                p-8

                shadow-2xl
            "
        >

            <div
                class="
                    text-center
                    mb-6
                "
            >

                <h2
                    class="
                        text-2xl
                        font-bold
                    "
                >
                    Login Admin
                </h2>

                <p
                    class="
                        text-sm
                        text-slate-500
                        mt-2
                    "
                >
                    Masukkan akun administrator
                </p>

            </div>

            <input
                id="email"
                type="email"
                placeholder="Email"
                class="
                    w-full
                    h-12

                    px-4

                    rounded-2xl

                    border
                    border-slate-200

                    mb-3
                "
            >

            <input
                id="password"
                type="password"
                placeholder="Password"
                class="
                    w-full
                    h-12

                    px-4

                    rounded-2xl

                    border
                    border-slate-200

                    mb-6
                "
            >

            <div
                class="
                    flex
                    gap-3
                "
            >

                <button
                    id="closeModal"
                    class="
                        flex-1
                        h-12

                        rounded-2xl

                        bg-slate-100

                        font-medium
                    "
                >
                    Batal
                </button>

                <button
                    id="loginBtn"
                    class="
                        flex-1
                        h-12

                        rounded-2xl

                        bg-blue-600

                        text-white

                        font-medium
                    "
                >
                    Login
                </button>

            </div>

        </div>

    </div>

    <!-- ATTENDANCE MODAL -->

    <div
        id="attendanceModal"
        class="
            fixed
            inset-0

            hidden

            items-center
            justify-center

            bg-black/50

            p-4

            z-[999]
        "
    >

        <div
            class="
                bg-white

                w-full
                max-w-md

                rounded-4xl

                p-8

                shadow-2xl
            "
        >

            <div
                class="
                    text-center
                "
            >

                <div
                    class="
                        text-5xl
                        mb-4
                    "
                >
                    ✅
                </div>

                <h2
                    class="
                        text-xl
                        font-bold
                    "
                >
                    Konfirmasi Kehadiran
                </h2>

                <p
                    class="
                        text-slate-500
                        mt-2
                    "
                >
                    Pastikan guru yang dipilih benar
                </p>

            </div>

            <div
                id="attendanceTeacherName"
                class="
                    mt-6

                    text-center

                    text-2xl
                    font-bold
                "
            >
            </div>

            <div
                class="
                    flex
                    gap-3
                    mt-8
                "
            >

                <button
                    id="cancelAttendance"
                    class="
                        flex-1
                        h-12

                        rounded-2xl

                        bg-slate-100
                    "
                >
                    Batal
                </button>

                <button
                    id="confirmAttendance"
                    class="
                        flex-1
                        h-12

                        rounded-2xl

                        bg-green-600

                        text-white

                        font-semibold
                    "
                >
                    Hadir
                </button>

            </div>

        </div>

    </div>

    <script
        type="module"
        src="./assets/js/app.js"
    ></script>

</body>

</html>
